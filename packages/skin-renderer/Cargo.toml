[package]
name = "statsify-skin-renderer"
authors = ["Jacob Koshy <jababakoshy@gmail.com>"]
edition = "2021"
version = "0.1.0"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2.16.1", features = ["async"] }
napi-derive = "2.16.1"
bytemuck = { version = "1.15.0", features = ["derive"] }
cgmath = "0.18.0"
futures-intrusive = "0.5.0"
image = "0.25.0"
tobj = { version = "4.0.2", features = ["async"] }
wgpu = "0.19.3"
thiserror = "1.0.58"
tokio = { version = "1.36.0", features = ["full"] }
lazy_static = "1.4.0"
async_once = "0.2.6"
reqwest = "0.12.2"

[build-dependencies]
napi-build = "2.1.2"
fs_extra = "1.3.0"
glob = "0.3.1"
