openapi: 3.0.0
paths:
  /player:
    get:
      operationId: PlayerController_getPlayer
      parameters:
        - name: player
          required: true
          in: query
          description: The player's username or uuid
          schema:
            example: j4cobi
            type: string
        - name: cache
          required: false
          in: query
          description: Describes whether to return live data or cached data.
          schema:
            $ref: '#/components/schemas/CacheLevel'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPlayerResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayerNotFoundException'
      security:
        - ApiKey: []
      summary: Get a Player
      tags:
        - Player
    post:
      operationId: PlayerController_updatePlayer
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlayerDto'
      responses:
        '201':
          description: ''
      security:
        - ApiKey: []
      summary: Update a Player
      tags:
        - Player
    delete:
      operationId: PlayerController_deletePlayer
      parameters:
        - name: player
          required: true
          in: query
          description: The player's username or uuid
          schema:
            example: j4cobi
            type: string
      responses:
        '200':
          description: ''
