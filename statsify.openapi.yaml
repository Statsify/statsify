            application/json:
              schema:
                $ref: '#/components/schemas/DeletePlayerResponse'
        '400':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
        - ApiKey: []
      summary: Deletes a Player
      tags:
        - Player
